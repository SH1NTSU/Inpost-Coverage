services:
  redis:
    image: redis:7-alpine
    container_name: paczkomat-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    container_name: paczkomat-postgres
    environment:
      POSTGRES_USER: paczkomat
      POSTGRES_PASSWORD: paczkomat
      POSTGRES_DB: paczkomat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paczkomat -d paczkomat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
